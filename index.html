<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Tablice</title>
</head>
<body>
<pre id="out"></pre>

<script>
let out = "";
function log(x){ out += x + "\n"; }

let tab1 = [7, 3, 1, 6, 9, 5, 4, 10, 2, 2];

log(tab1[4]);

tab1[6] = 12;

let tab2 = [...tab1];

let tab3 = [];
for(let i=0;i<tab1.length;i++){
    tab3[i] = tab1[i] + tab2[i];
}

tab2 = [...tab1].reverse();

let input = prompt("Podaj liczby do tablicy (przecinki):");
let arr = input.split(",").map(Number);

let min = arr[0], max = arr[0], sum = 0, count3 = 0, even = 0, odd = 0, div3 = 0;

for(let i=0;i<arr.length;i++){
    if(arr[i] < min) min = arr[i];
    if(arr[i] > max) max = arr[i];
    sum += arr[i];
    if(arr[i] === 3) count3++;
    if(arr[i] % 2 === 0) even++; else odd++;
    if(arr[i] % 3 === 0) div3++;
}

let avg = sum / arr.length;

let sorted = [...arr].sort((a,b)=>a-b);

let median = sorted.length % 2 === 0 ?
(sorted[sorted.length/2 - 1] + sorted[sorted.length/2]) / 2 :
sorted[Math.floor(sorted.length/2)];

log(min);
log(max);
log(avg);
log(count3);
log(sorted);
log(median);

log(sorted[0] + "," + sorted[1] + "," + sorted[2]);
log(sorted[sorted.length-3] + "," + sorted[sorted.length-2] + "," + sorted[sorted.length-1]);

let squared = arr.map(x=>x*x);

log(even);
log(odd);
log(div3);

let letters = prompt("Podaj 10 liter:").split("");
let word = prompt("Podaj 10-literowy wyraz:").split("");

for(let i=0;i<letters.length;i++){
    if(letters[i] === letters[i].toUpperCase()) letters[i]=letters[i].toLowerCase();
    else letters[i]=letters[i].toUpperCase();
}

log(letters.sort(()=>Math.random()-0.5));

let A = [];
for(let i=0;i<100;i++){
    A[i] = Math.floor(Math.random()*100);
}

let maxA = Math.max(...A);
let countMax = A.filter(x=>x===maxA).length;

log(maxA);
log(countMax);

log(A.filter(x=>x%2!==0));
log(A.filter((x,i)=>i%2!==0));

let inRange = A.filter(x=>x>=5 && x<15);

log(inRange.length);
log(inRange);

let a = Number(prompt("Podaj liczbę a:"));
let closest = A.reduce((p,c)=>Math.abs(c-a)<Math.abs(p-a)?c:p);

log(closest);

let minIdx = A.indexOf(Math.min(...A));

log(A[minIdx-1]);
log(A[minIdx+1]);

let gt10 = A.filter(x=>x>10);

let B = [];
B[0] = A[0];
for(let i=1;i<A.length;i++){
    B[i] = B[i-1] + A[i];
}

log(B);

log([...A].sort((a,b)=>b-a));

let freq = {};
for(let x of A) freq[x]=(freq[x]||0)+1;

for(let k in freq){
    if(freq[k]>=3) log(k);
}

let fib = [0,1];
for(let i=2;i<100;i++) fib[i]=fib[i-1]+fib[i-2];

let pow2 = [];
for(let i=0;i<100;i++) pow2[i]=2**i;

let seq1 = [];
for(let i=1;i<=100;i++) seq1[i-1]=3*i;

let seq2 = [];
for(let i=0;i<100;i++) seq2[i]=2**(i+1);

document.getElementById("out").textContent = out;
</script>
</body>
</html>
